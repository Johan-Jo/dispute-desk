# Shopify App Configuration — DisputeDesk (Dispute Ops)
# https://shopify.dev/docs/apps/tools/cli/configuration

name = "DisputeDesk"
# For deploy, CLI reads these literally. Use SHOPIFY_APP_URL from .env.local at runtime.
client_id = "${SHOPIFY_API_KEY}"
application_url = "https://disputedesk.app"
embedded = true

[auth]
redirect_urls = [
  "https://disputedesk.app/api/auth/shopify/callback",
]

[access_scopes]
# read_shopify_payments_dispute_evidences, write_shopify_payments_dispute_evidences blocked at version create (app_access); use Open in Shopify + copy until approved
scopes = "read_orders,read_customers,read_products,read_fulfillments,read_shipping,read_shopify_payments_disputes,read_files,write_files"

[webhooks]
api_version = "2026-01"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/api/webhooks/app-uninstalled"

  [[webhooks.subscriptions]]
  topics = ["shop/update"]
  uri = "/api/webhooks/shop-update"

# disputes/create and disputes/update registered at runtime (OAuth) - require protected-customer-data approval in Partners

# App proxy not used; minimal values required by CLI validation
[app_proxy]
url = "https://example.com/proxy"
subpath = "app"
prefix = "apps"

[pos]
embedded = false
