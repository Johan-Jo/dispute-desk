# Shopify App Configuration — DisputeDesk (Dispute Ops)
# https://shopify.dev/docs/apps/tools/cli/configuration

name = "DisputeDesk"
# For deploy, CLI reads these literally. Use SHOPIFY_APP_URL from .env.local at runtime.
client_id = "84f40ec77c9ba18e9eabc1657d9b6af8"
application_url = "https://disputedesk.app"
embedded = true

[auth]
redirect_urls = [
  "https://disputedesk.app/api/auth/shopify/callback",
]

[access_scopes]
# Evidence scopes (read/write_shopify_payments_dispute_evidences) approved by
# App Review (2026-03-02, Reggie F.) but blocked by CLI deploy validation
# (Shopify/cli#4288 — restricted to "Payments Apps" in the deploy pipeline).
# They ARE requested in our custom OAuth flow (SHOPIFY_SCOPES env var) and
# Shopify grants them at install time.
# Seed script (scripts/shopify/) needs: write_draft_orders, write_fulfillments, write_merchant_managed_fulfillment_orders
scopes = "read_orders,write_orders,read_customers,read_products,read_fulfillments,read_shipping,read_shopify_payments_disputes,read_files,write_files,write_draft_orders,write_fulfillments,write_merchant_managed_fulfillment_orders"

[webhooks]
api_version = "2026-01"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/api/webhooks/app-uninstalled"

  [[webhooks.subscriptions]]
  topics = ["shop/update"]
  uri = "/api/webhooks/shop-update"

# disputes/create and disputes/update registered at runtime (OAuth) - require protected-customer-data approval in Partners

# App proxy not used; minimal values required by CLI validation
[app_proxy]
url = "https://example.com/proxy"
subpath = "app"
prefix = "apps"

[pos]
embedded = false
