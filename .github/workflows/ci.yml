name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint . --max-warnings 0 || true

      - name: Unit tests
        run: npx vitest run --reporter=verbose

      - name: Security audit
        run: npm audit --audit-level=critical

      - name: Forbidden copy check
        run: |
          if grep -rn "submit response\|submit to card network\|file dispute response" \
            --include="*.tsx" --include="*.ts" \
            app/ components/ lib/ 2>/dev/null; then
            echo "ERROR: Found forbidden UX copy"
            exit 1
          fi
          echo "No forbidden copy found"
